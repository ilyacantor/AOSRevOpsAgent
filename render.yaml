services:
  - type: web
    name: pipeline-health-monitor
    env: node
    runtime: node
    buildCommand: "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port=$PORT"
    envVars:
      - key: SALESFORCE_INSTANCE_URL
        sync: false
      - key: SALESFORCE_CLIENT_ID
        sync: false
      - key: SALESFORCE_CLIENT_SECRET
        sync: false
      - key: SALESFORCE_REFRESH_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: VITE_USE_PLATFORM_VIEWS
        sync: false
    healthCheckPath: /
    plan: starter
